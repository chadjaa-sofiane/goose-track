services:
  mongo:
    image: mongo:7
    container_name: goose_track_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ../packages/api
    container_name: goose_track_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      MONGODB_DEVELOPMENT_URI: mongodb://mongo:27017/development
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ../packages/api:/app
      - /app/node_modules

  client:
    build:
      context: ../packages/client
    container_name: goose_track_client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:5173'
    volumes:
      - ../packages/client:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  mongo_data:
